name: kimi-code-bot
on:
  pull_request:
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write
  contents: read
  statuses: write

env:
  KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
  KIMI_BASE_URL: ${{ vars.KIMI_BASE_URL }}
  KIMI_MODEL_NAME: ${{ vars.KIMI_MODEL_NAME }}

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pat: ${{ secrets.GH_PAT }}
          git-ref: master  # pre-release dogfood: install from git

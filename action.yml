name: kimi-bot
description: AI code review powered by kimi-cli
author: liuchong
branding:
  icon: eye
  color: blue

inputs:
  github-token:
    description: GITHUB_TOKEN
    required: true
  gh-pat:
    description: PAT for resolveReviewThread (optional)
    required: false
    default: ""
  version:
    description: kimi-bot version to install (PyPI version; empty = latest)
    required: false
    default: ""
  git-ref:
    description: install from git instead of PyPI (branch/tag/sha of liuchong/kimi-bot)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v6

    - name: Install kimi-bot
      shell: bash
      run: |
        if [ -n "${{ inputs.git-ref }}" ]; then
          uv tool install "git+https://github.com/liuchong/kimi-bot.git@${{ inputs.git-ref }}"
        elif [ -n "${{ inputs.version }}" ]; then
          uv tool install "kimi-bot==${{ inputs.version }}"
        else
          uv tool install kimi-bot
        fi

    # LLM credentials (KIMI_API_KEY / KIMI_BASE_URL / KIMI_MODEL_NAME) are read from
    # job-level env by kimi-cli itself; nothing to forward here.
    - name: Dispatch
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GH_PAT: ${{ inputs.gh-pat }}
      run: |
        # bare invocation: dispatch on github.event_name via GITHUB_EVENT_PATH
        kimi-bot --verbose

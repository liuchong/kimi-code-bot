name: kimi-code-bot
description: AI code review powered by kimi-cli
author: liuchong
branding:
  icon: eye
  color: blue

inputs:
  github-token:
    description: GITHUB_TOKEN
    required: true
  gh-pat:
    description: PAT for resolveReviewThread (optional)
    required: false
    default: ""
  version:
    description: kimi-code-bot version to install (PyPI version; empty = latest)
    required: false
    default: ""
  git-ref:
    description: install from git instead of PyPI (branch/tag/sha of liuchong/kimi-code-bot)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@v6

    - name: Install kimi-code-bot
      shell: bash
      run: |
        if [ -n "${{ inputs.git-ref }}" ]; then
          uv tool install "git+https://github.com/liuchong/kimi-code-bot.git@${{ inputs.git-ref }}"
        elif [ -n "${{ inputs.version }}" ]; then
          uv tool install "kimi-code-bot==${{ inputs.version }}"
        else
          uv tool install kimi-code-bot
        fi

    # Comment events (issue_comment / pull_request_review_comment) check out the
    # DEFAULT branch by default — the review agent would find no PR files and
    # report nothing. Fetch and check out the PR head first.
    - name: Checkout PR head for comment events
      if: github.event_name != 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -e
        PR=$(jq -r '.issue.number // .pull_request.number // empty' "$GITHUB_EVENT_PATH")
        SHA=$(gh api "repos/${{ github.repository }}/pulls/$PR" --jq .head.sha)
        echo "checking out PR #$PR head $SHA"
        git fetch origin "$SHA" --depth=1
        git checkout "$SHA"

    # LLM credentials (KIMI_API_KEY / KIMI_BASE_URL / KIMI_MODEL_NAME) are read from
    # job-level env by kimi-cli itself; nothing to forward here.
    - name: Dispatch
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GH_PAT: ${{ inputs.gh-pat }}
      run: |
        # bare invocation: dispatch on github.event_name via GITHUB_EVENT_PATH
        kimi-code-bot --verbose
